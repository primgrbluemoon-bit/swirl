<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Immersive Circular Engine — Dual Layers</title>
<style>
/* Reset & base */
*,:before,:after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;width:100%;background:#000;font-family:system-ui;overflow:hidden;color:#fff}

/* Setup panel */
#setup{position:fixed;inset:0;display:flex;justify-content:center;align-items:center;flex-direction:column;gap:12px;background:#020617;z-index:100;padding:20px}
#uploadLabel,#overlayUploadLabel{padding:10px 18px;background:#334155;border-radius:36px;cursor:pointer;font-weight:600}
#previewRow{display:flex;align-items:center;gap:12px}
#previewBox{width:120px;height:120px;border:2px solid #334155;border-radius:12px;display:flex;justify-content:center;align-items:center;overflow:hidden;background:#0f172a}
#previewBox img{width:100%;height:100%;object-fit:cover;display:block}
.controls{display:flex;flex-direction:column;gap:8px;align-items:flex-start}
.row{display:flex;gap:8px;align-items:center}
.small{font-size:0.85rem;opacity:0.85}
input[type="range"]{width:200px}
input[type="file"]{display:none}
#playBtn{padding:10px 18px;background:#22d3ee;border-radius:36px;font-weight:700;border:none;cursor:pointer;display:none}

/* Stage */
#stage{position:fixed;inset:0;display:none;flex-direction:column;justify-content:center;align-items:center;background:#000}
#circle{position:relative;width:80vmin;height:80vmin;border-radius:50%;overflow:hidden;touch-action:none;-webkit-tap-highlight-color:transparent;background:transparent}

/* Two stacked images with identical geometry so crop is identical */
#baseImage,#overlayImage{
    position:absolute;
    top:50%;left:50%;
    width:100%;height:100%;
    object-fit:cover;
    transform-origin:center center;
    will-change:transform;
    transform: translate(-50%,-50%) rotate(0deg);
}

/* overlay sits above base but below center overlay text */
#overlayImage{pointer-events:none;opacity:0.6}

/* center overlay does not rotate */
#centerOverlay{
    position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
    pointer-events:none;text-align:center;white-space:pre-wrap;word-break:break-word;max-width:90%;font-weight:700
}

#displayText{margin-top:18px;font-size:1.2rem;font-weight:600;text-align:center;max-width:80%;word-wrap:break-word;color:#fff}

/* responsiveness */
@media(max-width:640px){
    #setup{padding:12px}
    input[type="range"]{width:140px}
}
</style>
</head>
<body>

<!-- Setup UI -->
<div id="setup">
    <div id="previewRow">
        <div id="previewBox"><img id="previewImage" alt="preview"></div>

        <div class="controls">
            <div class="row">
                <label id="uploadLabel" class="small">Select Base Image
                    <input id="fileInput" type="file" accept="image/*">
                </label>

                <label id="overlayUploadLabel" class="small">Select Overlay (PNG)
                    <input id="overlayInput" type="file" accept="image/png">
                </label>
            </div>

            <div class="row small">
                <label for="bgColorPicker">Background</label>
                <input id="bgColorPicker" type="color" value="#000000" aria-label="Background color picker">
            </div>
        </div>
    </div>

    <div class="controls" style="width:100%;max-width:720px">
        <div class="row">
            <label class="small">Caption (below)</label>
            <input id="textInput" type="text" placeholder="Optional text below image" style="padding:8px;border-radius:8px;border:none;width:320px">
        </div>

        <div class="row" style="align-items:center;">
            <div style="min-width:120px" class="small">Base speed</div>
            <input id="baseSpeed" type="range" min="0" max="360" value="60" step="1">
            <div id="baseSpeedVal" class="small" style="min-width:40px;text-align:right">60°/s</div>
        </div>

        <div class="row" style="align-items:center;">
            <div style="min-width:120px" class="small">Overlay speed</div>
            <input id="overlaySpeed" type="range" min="0" max="360" value="40" step="1">
            <div id="overlaySpeedVal" class="small" style="min-width:40px;text-align:right">40°/s</div>
        </div>

        <div class="row" style="align-items:center;">
            <div style="min-width:120px" class="small">Overlay opacity</div>
            <input id="overlayOpacity" type="range" min="0" max="1" step="0.01" value="0.6">
            <div id="overlayOpacityVal" class="small" style="min-width:40px;text-align:right">0.60</div>
        </div>

        <div id="centerControls" class="row">
            <input id="centerTextInput" type="text" placeholder="Center overlay (any language)" style="padding:8px;border-radius:8px;border:none;width:240px">
            <input id="centerTextColor" type="color" value="#ffffff" title="Center text color" style="width:40px;height:40px;padding:0;border-radius:6px;border:1px solid #334155">
            <input id="centerTextSize" type="number" value="28" min="10" max="200" step="1" title="Font size (px)" style="width:70px;padding:8px;border-radius:8px;border:none">
        </div>

    </div>

    <button id="playBtn">Play</button>

    <div class="small touchHint">Mobile gestures: tap circle to start/stop, swipe up/down to change base speed. Two-finger pinch changes base speed proportionally. Use arrows to change base speed; shift+arrows change overlay speed.</div>
</div>

<!-- Stage -->
<div id="stage">
    <div id="circle">
        <img id="baseImage" alt="base layer">
        <img id="overlayImage" alt="overlay layer">
        <div id="centerOverlay" aria-hidden="true"></div>
    </div>
    <div id="displayText" role="status" aria-live="polite"></div>
</div>

<script>
/* CONFIG */
const Config = (function(){
    const settings = {
        rotationSpeed: 60,           // base (deg/sec)
        overlaySpeed: 40,            // overlay (deg/sec)
        overlayOpacity: 0.6,
        backgroundColor: "#000000",
        displayText: "",
        centerText: "",
        centerTextColor: "#ffffff",
        centerTextSize: 28
    };
    return {
        get(k){ return settings[k]; },
        set(k,v){ settings[k] = v; }
    };
})();

/* STATE */
const State = (function(){
    const STATES = { INIT:"INIT", READY:"READY", RUNNING:"RUNNING" };
    let current = STATES.INIT;
    return { set(s){ current = s }, is(s){ return current === s }, STATES };
})();

/* Contrast util */
function getContrastColor(hex){
    const r = parseInt(hex.substr(1,2),16);
    const g = parseInt(hex.substr(3,2),16);
    const b = parseInt(hex.substr(5,2),16);
    const luminance = (0.299*r + 0.587*g + 0.114*b)/255;
    return luminance > 0.6 ? "#000000" : "#ffffff";
}

/* ENGINE */
const Engine = (function(){
    const baseImg = document.getElementById('baseImage');
    const overlayImg = document.getElementById('overlayImage');
    const stage = document.getElementById('stage');
    const setup = document.getElementById('setup');
    const displayText = document.getElementById('displayText');
    const centerOverlay = document.getElementById('centerOverlay');

    let baseAngle = 0;
    let overlayAngle = 0;
    let lastTime = performance.now();
    let raf = null;

    function applyCenterStyles(){
        centerOverlay.textContent = Config.get('centerText');
        centerOverlay.style.color = Config.get('centerTextColor');
        centerOverlay.style.fontSize = Config.get('centerTextSize') + 'px';
        centerOverlay.style.fontFamily = "system-ui, -apple-system, 'Segoe UI', Roboto, 'Noto Sans', sans-serif";
        centerOverlay.style.textShadow = "0 1px 2px rgba(0,0,0,0.6)";
    }

    function start(){
        // require base image to be loaded
        if(!baseImg.src) return;

        State.set(State.STATES.RUNNING);
        stage.style.background = Config.get('backgroundColor');
        displayText.textContent = Config.get('displayText');
        displayText.style.color = getContrastColor(Config.get('backgroundColor'));

        applyCenterStyles();
        centerOverlay.style.display = Config.get('centerText') ? 'block' : 'none';

        // ensure overlay opacity matches config
        overlayImg.style.opacity = Config.get('overlayOpacity');

        setup.style.display = 'none';
        stage.style.display = 'flex';

        lastTime = performance.now();
        raf = requestAnimationFrame(loop);
    }

    function stop(){
        cancelAnimationFrame(raf);
        raf = null;
        baseAngle = 0;
        overlayAngle = 0;

        baseImg.style.transform = "translate(-50%,-50%) rotate(0deg)";
        overlayImg.style.transform = "translate(-50%,-50%) rotate(0deg)";

        stage.style.display = 'none';
        setup.style.display = 'flex';

        State.set(State.STATES.READY);
    }

    function loop(now = performance.now()){
        if(!State.is(State.STATES.RUNNING)) return;
        const delta = now - lastTime;
        lastTime = now;

        // degrees per second -> degrees to add this frame
        const bs = Number(Config.get('rotationSpeed')) || 0;
        const os = Number(Config.get('overlaySpeed')) || 0;

        baseAngle += (bs * delta) / 1000;
        overlayAngle -= (os * delta) / 1000; // negative to rotate opposite direction

        // set transforms (translate to center then rotate)
        baseImg.style.transform = `translate(-50%,-50%) rotate(${baseAngle}deg)`;
        overlayImg.style.transform = `translate(-50%,-50%) rotate(${overlayAngle}deg)`;

        raf = requestAnimationFrame(loop);
    }

    return { start, stop };
})();

/* UI Wiring */
(function(){
    const fileInput = document.getElementById('fileInput');
    const overlayInput = document.getElementById('overlayInput');
    const playBtn = document.getElementById('playBtn');
    const previewImage = document.getElementById('previewImage');
    const baseImage = document.getElementById('baseImage');
    const overlayImage = document.getElementById('overlayImage');
    const bgColorPicker = document.getElementById('bgColorPicker');
    const textInput = document.getElementById('textInput');

    const baseSpeed = document.getElementById('baseSpeed');
    const baseSpeedVal = document.getElementById('baseSpeedVal');
    const overlaySpeed = document.getElementById('overlaySpeed');
    const overlaySpeedVal = document.getElementById('overlaySpeedVal');
    const overlayOpacity = document.getElementById('overlayOpacity');
    const overlayOpacityVal = document.getElementById('overlayOpacityVal');

    const centerTextInput = document.getElementById('centerTextInput');
    const centerTextColor = document.getElementById('centerTextColor');
    const centerTextSize = document.getElementById('centerTextSize');

    /* Background color */
    bgColorPicker.addEventListener('input', e=>{
        Config.set('backgroundColor', e.target.value);
        // if stage visible change immediately
        const stage = document.getElementById('stage');
        if(stage.style.display === 'flex') stage.style.background = e.target.value;
    });

    /* caption below */
    textInput.addEventListener('input', e=>{
        Config.set('displayText', e.target.value);
        const displayText = document.getElementById('displayText');
        displayText.textContent = e.target.value;
    });

    /* center overlay */
    centerTextInput.addEventListener('input', e=>{
        Config.set('centerText', e.target.value);
        document.getElementById('centerOverlay').textContent = e.target.value;
    });
    centerTextColor.addEventListener('input', e=>{
        Config.set('centerTextColor', e.target.value);
        document.getElementById('centerOverlay').style.color = e.target.value;
    });
    centerTextSize.addEventListener('input', e=>{
        const v = parseInt(e.target.value,10) || 28;
        Config.set('centerTextSize', v);
        document.getElementById('centerOverlay').style.fontSize = v + 'px';
    });

    /* base image upload */
    fileInput.addEventListener('change', e=>{
        const f = e.target.files && e.target.files[0];
        if(!f) return;
        const reader = new FileReader();
        reader.onload = ev=>{
            baseImage.src = ev.target.result;
            previewImage.src = ev.target.result;
            // mark ready
            State.set(State.STATES.READY);
            playBtn.style.display = 'inline-block';
        };
        reader.readAsDataURL(f);
    });

    /* overlay PNG upload (optional) */
    overlayInput.addEventListener('change', e=>{
        const f = e.target.files && e.target.files[0];
        if(!f) return;
        const reader = new FileReader();
        reader.onload = ev=>{
            overlayImage.src = ev.target.result;
            // keep overlay visible (opacity controlled separately)
            overlayImage.style.opacity = Config.get('overlayOpacity');
            // ensure play button visible if base already loaded
            if(baseImage.src) playBtn.style.display = 'inline-block';
        };
        reader.readAsDataURL(f);
    });

    /* play button */
    playBtn.addEventListener('click', ()=>{
        if(State.is(State.STATES.READY)) Engine.start();
    });

    /* speed and opacity controls */
    function updateBaseSpeedDisplay(){
        baseSpeedVal.textContent = baseSpeed.value + '°/s';
        Config.set('rotationSpeed', Number(baseSpeed.value));
    }
    baseSpeed.addEventListener('input', updateBaseSpeedDisplay);
    updateBaseSpeedDisplay();

    function updateOverlaySpeedDisplay(){
        overlaySpeedVal.textContent = overlaySpeed.value + '°/s';
        Config.set('overlaySpeed', Number(overlaySpeed.value));
    }
    overlaySpeed.addEventListener('input', updateOverlaySpeedDisplay);
    updateOverlaySpeedDisplay();

    function updateOverlayOpacityDisplay(){
        overlayOpacityVal.textContent = Number(overlayOpacity.value).toFixed(2);
        Config.set('overlayOpacity', Number(overlayOpacity.value));
        overlayImage.style.opacity = Config.get('overlayOpacity');
    }
    overlayOpacity.addEventListener('input', updateOverlayOpacityDisplay);
    updateOverlayOpacityDisplay();

    /* small accessibility: pressing Enter on preview toggles play/stop */
    previewImage.addEventListener('click', ()=>{
        if(State.is(State.STATES.RUNNING)) Engine.stop();
        else if(State.is(State.STATES.READY)) Engine.start();
    });

    /* ensure preview image is non-interactive for selection */
    previewImage.style.userSelect = 'none';
    previewImage.style.touchAction = 'manipulation';
})();

/* Keyboard & global input handling */
/* arrow up/down change base rotation speed; shift+arrow changes overlay speed */
document.addEventListener('keydown', e=>{
    const key = e.key.toLowerCase();

    // stop/start
    if(key === 'escape' || key === 'q') { Engine.stop(); return; }

    // arrow controls
    if(key === 'arrowup' || key === 'arrowdown'){
        const baseInc = (key === 'arrowup') ? 20 : -20;
        if(e.shiftKey){
            // adjust overlay speed
            const cur = Number(Config.get('overlaySpeed')) || 0;
            Config.set('overlaySpeed', Math.max(0, cur + baseInc));
            const overlaySpeedEl = document.getElementById('overlaySpeed');
            overlaySpeedEl.value = Config.get('overlaySpeed');
            document.getElementById('overlaySpeedVal').textContent = overlaySpeedEl.value + '°/s';
        } else {
            // adjust base speed
            const cur = Number(Config.get('rotationSpeed')) || 0;
            Config.set('rotationSpeed', Math.max(0, cur + baseInc));
            const baseSpeedEl = document.getElementById('baseSpeed');
            baseSpeedEl.value = Config.get('rotationSpeed');
            document.getElementById('baseSpeedVal').textContent = baseSpeedEl.value + '°/s';
        }
    }
});

/* Touch & gesture handling on #circle (base speed adjustments) */
(function(){
    const circle = document.getElementById('circle');

    let startY = 0;
    let startSpeed = 0;
    let startTime = 0;
    let isPinching = false;
    let pinchStartDistance = 0;
    let pinchStartSpeed = 0;

    function getDistance(t1,t2){ return Math.hypot(t2.clientX - t1.clientX, t2.clientY - t1.clientY); }

    circle.addEventListener('touchstart', e=>{
        if(e.touches.length === 1){
            const t = e.touches[0];
            startY = t.clientY;
            startSpeed = Config.get('rotationSpeed');
            startTime = Date.now();
            isPinching = false;
        }
        if(e.touches.length === 2){
            isPinching = true;
            pinchStartDistance = getDistance(e.touches[0], e.touches[1]);
            pinchStartSpeed = Config.get('rotationSpeed');
        }
    }, {passive:true});

    circle.addEventListener('touchmove', e=>{
        if(isPinching && e.touches.length === 2){
            const newDistance = getDistance(e.touches[0], e.touches[1]);
            if(pinchStartDistance > 0){
                const scale = newDistance / pinchStartDistance;
                const newSpeed = Math.max(0, Math.round(pinchStartSpeed * scale));
                Config.set('rotationSpeed', newSpeed);
                const baseSpeedEl = document.getElementById('baseSpeed');
                baseSpeedEl.value = newSpeed;
                document.getElementById('baseSpeedVal').textContent = baseSpeedEl.value + '°/s';
            }
            e.preventDefault();
            return;
        }
        if(e.touches.length === 1){
            const t = e.touches[0];
            const deltaY = startY - t.clientY;
            const sensitivity = 0.5;
            const newSpeed = Math.max(0, Math.round(startSpeed + (deltaY * sensitivity)));
            Config.set('rotationSpeed', newSpeed);
            const baseSpeedEl = document.getElementById('baseSpeed');
            baseSpeedEl.value = newSpeed;
            document.getElementById('baseSpeedVal').textContent = baseSpeedEl.value + '°/s';
        }
    }, {passive:false});

    circle.addEventListener('touchend', e=>{
        if(isPinching){ isPinching = false; return; }
        const duration = Date.now() - startTime;
        if(duration < 250){
            if(State.is(State.STATES.RUNNING)) Engine.stop();
            else if(State.is(State.STATES.READY)) Engine.start();
        }
    });

    // mouse click toggles as well
    circle.addEventListener('click', ()=>{
        if(State.is(State.STATES.RUNNING)) Engine.stop();
        else if(State.is(State.STATES.READY)) Engine.start();
    });
})();

</script>
</body>
</html>
