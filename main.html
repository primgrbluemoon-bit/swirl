<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Immersive Circular Engine</title>

<style>
*,
*::before,
*::after{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html, body{
    height:100%;
    width:100%;
    background:#000;
    font-family:system-ui;
    overflow:hidden;
}

#setup{
    position:fixed;
    inset:0;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    gap:18px;
    background:#020617;
    color:white;
    z-index:100;
}

#uploadLabel{
    padding:14px 36px;
    background:#334155;
    border-radius:40px;
    cursor:pointer;
    font-weight:600;
}

#previewBox{
    width:120px;
    height:120px;
    border:2px solid #334155;
    border-radius:12px;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    background:#0f172a;
}

#previewBox img{
    width:100%;
    height:100%;
    object-fit:cover;
}

#textInput{
    padding:10px 14px;
    border-radius:8px;
    border:none;
    width:220px;
}

#playBtn{
    padding:14px 36px;
    background:#22d3ee;
    border-radius:40px;
    font-weight:700;
    border:none;
    cursor:pointer;
    display:none;
}

#colorWrapper{
    display:flex;
    align-items:center;
    gap:10px;
    font-weight:600;
}

input[type="file"]{
    display:none;
}

#stage{
    position:fixed;
    inset:0;
    display:none;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    background:#000;
}

#circle{
    position:relative;
    width:80vmin;
    height:80vmin;
    border-radius:50%;
    overflow:hidden;
}

#renderImage{
    position:absolute;
    top:50%;
    left:50%;
    width:100%;
    height:100%;
    object-fit:cover;
    transform-origin:center center;
    will-change:transform;
}

#displayText{
    margin-top:20px;
    font-size:1.5rem;
    font-weight:600;
    text-align:center;
    max-width:80%;
    word-wrap:break-word;
}
</style>
</head>
<body>

<div id="setup">

    <label id="uploadLabel">
        Select Image
        <input type="file" id="fileInput" accept="image/*">
    </label>

    <div id="previewBox">
        <img id="previewImage" />
    </div>

    <div id="colorWrapper">
        Background Color
        <input type="color" id="bgColorPicker" value="#000000">
    </div>

    <input type="text" id="textInput" placeholder="Optional text below image">

    <button id="playBtn">Play</button>

</div>

<div id="stage">
    <div id="circle">
        <img id="renderImage"/>
    </div>
    <div id="displayText"></div>
</div>

<script>

/* CONFIG */

const Config = (function(){
    const settings = {
        rotationSpeed: 60,
        backgroundColor: "#000000",
        displayText: ""
    };
    return {
        get(key){ return settings[key]; },
        set(key,value){ settings[key] = value; }
    };
})();

/* STATE */

const State = (function(){
    const STATES = {
        INIT: "INIT",
        READY: "READY",
        RUNNING: "RUNNING"
    };
    let current = STATES.INIT;
    return {
        set(state){ current = state; },
        is(state){ return current === state; },
        STATES
    };
})();

/* CONTRAST FUNCTION */

function getContrastColor(hex){

    const r = parseInt(hex.substr(1,2),16);
    const g = parseInt(hex.substr(3,2),16);
    const b = parseInt(hex.substr(5,2),16);

    const luminance =
        (0.299 * r + 0.587 * g + 0.114 * b) / 255;

    return luminance > 0.6 ? "#000000" : "#ffffff";
}

/* ENGINE */

const Engine = (function(){

    const imageEl = document.getElementById("renderImage");
    const stage = document.getElementById("stage");
    const setup = document.getElementById("setup");
    const displayText = document.getElementById("displayText");

    let angle = 0;
    let animationId = null;
    let lastTime = performance.now();

    function start(){

        State.set(State.STATES.RUNNING);

        const bg = Config.get("backgroundColor");

        stage.style.background = bg;
        displayText.textContent = Config.get("displayText");
        displayText.style.color = getContrastColor(bg);

        stage.style.display = "flex";
        setup.style.display = "none";

        loop();
    }

    function stop(){

        cancelAnimationFrame(animationId);
        angle = 0;

        imageEl.style.transform =
            "translate(-50%, -50%) rotate(0deg)";

        stage.style.display = "none";
        setup.style.display = "flex";

        State.set(State.STATES.READY);
    }

    function loop(now = performance.now()){

        if(!State.is(State.STATES.RUNNING)) return;

        const delta = now - lastTime;
        lastTime = now;

        const speed = Config.get("rotationSpeed");
        angle += (speed * delta) / 1000;

        imageEl.style.transform =
            `translate(-50%, -50%) rotate(${angle}deg)`;

        animationId = requestAnimationFrame(loop);
    }

    return { start, stop };

})();

/* INPUT CONTROLS */

document.addEventListener("keydown", e => {

    const key = e.key.toLowerCase();

    if(key === "escape" || key === "q"){
        Engine.stop();
    }

    if(key === "arrowup"){
        const current = Config.get("rotationSpeed");
        Config.set("rotationSpeed", current + 20);
    }

    if(key === "arrowdown"){
        const current = Config.get("rotationSpeed");
        Config.set("rotationSpeed", Math.max(0, current - 20));
    }

});

/* UI */

(function(){

    const fileInput = document.getElementById("fileInput");
    const playBtn = document.getElementById("playBtn");
    const renderImage = document.getElementById("renderImage");
    const previewImage = document.getElementById("previewImage");
    const bgColorPicker = document.getElementById("bgColorPicker");
    const textInput = document.getElementById("textInput");

    bgColorPicker.addEventListener("input", e=>{
        Config.set("backgroundColor", e.target.value);
    });

    textInput.addEventListener("input", e=>{
        Config.set("displayText", e.target.value);
    });

    fileInput.addEventListener("change", e=>{
        const file = e.target.files[0];
        if(!file) return;

        const reader = new FileReader();
        reader.onload = event=>{
            renderImage.src = event.target.result;
            previewImage.src = event.target.result;

            State.set(State.STATES.READY);
            playBtn.style.display = "inline-block";
        };
        reader.readAsDataURL(file);
    });

    playBtn.addEventListener("click", ()=>{
        if(State.is(State.STATES.READY)){
            Engine.start();
        }
    });

})();
</script>
</body>
</html>
